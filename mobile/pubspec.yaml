name: hinata_mobile
description: "🌸 Hinata — Your Personal AI Agent mobile app"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # State Management
  provider: ^6.1.1
  shared_preferences: ^2.2.2

  # Networking
  web_socket_channel: ^2.4.0
  http: ^1.2.0
  connectivity_plus: ^6.0.3

  # Voice
  speech_to_text: ^6.6.0
  flutter_tts: ^4.0.2

  # Permissions & System
  permission_handler: ^11.3.0
  device_info_plus: ^10.1.0
  path_provider: ^2.1.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
